<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h1 class="text-center mt-4">Queue Admin Dashboard</h1>

<div class="row">

{% for counter, queue in counters.items() %}

<div class="col-md-3">

<div class="card p-3 m-3">

<h4>{{ counter }}</h4>

<p>Queue Length: {{ queue|length }}</p>

<p>Now Serving: {{ serving[counter] }}</p>

<a href="/next/{{ counter }}">
<button class="btn btn-primary">Call Next</button>
</a>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
